- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf.dln
    ~/.vimrc: ./vim/vimrc.dln
    ~/.bashrc: bashrc.dln
    ~/.gitconfig: gitconfig.dln
    ~/.Xmodmap: Xmodmap.dln

- shell:
  -
    command: ./vim/install
    description: Running Vim specifics installation
    stdout: true
    quiet: true
